<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/reports/og-mockups/srv-base.css" />
    <style>
      .card{overflow:hidden;}
      /* big flat blue angular shape anchoring the empty right field */
      .shape{position:absolute;right:-80px;bottom:-60px;width:620px;height:560px;background:var(--blue);
        clip-path:polygon(38% 0,100% 0,100% 100%,0 100%);}
      .shapedot{position:absolute;right:84px;bottom:96px;width:26px;height:26px;border-radius:50%;
        background:oklch(0.630 0.256 25);}
      /* left narrow column */
      .col{position:absolute;left:0;top:0;bottom:0;width:420px;border-right:2px solid var(--ink);
        background:var(--canvas);padding:40px 36px;display:flex;flex-direction:column;}
      .top{font-family:ui-monospace,monospace;font-size:13px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}
      .label{align-self:flex-start;margin-top:22px;background:var(--blue);color:var(--paper);padding:5px 12px;font-size:15px;}
      .title{margin-top:18px;font-weight:700;font-size:38px;line-height:1.2;letter-spacing:-0.02em;color:var(--ink);}
      .sign{margin-top:auto;}
      .sign img{display:block;width:340px;height:auto;margin-left:-4px;}
      .meta{margin-top:14px;font-family:ui-monospace,monospace;font-size:12px;letter-spacing:0.12em;
        color:var(--subtle);text-transform:uppercase;}
      .mark{position:absolute;display:flex;gap:7px;font-family:ui-monospace,monospace;z-index:6;
        font-size:12px;letter-spacing:0.12em;color:var(--blue);text-transform:uppercase;line-height:1;}
      .mark i{display:block;width:18px;height:18px;border:2px solid var(--blue);flex:0 0 auto;}
      .mark.tr{top:40px;right:44px;flex-direction:row-reverse;align-items:flex-start;color:var(--paper);}
      .mark.tr i{border-left:0;border-bottom:0;border-color:var(--paper);}
      .mark.tt{top:40px;left:460px;}
      .mark.tt i{border-right:0;border-bottom:0;}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="grid"></div>
      <div class="shape"></div>
      <div class="shapedot"></div>
      <div class="col">
        <span class="top">napochaan.com</span>
        <span class="label mono">news</span>
        <h1 class="title">サイトを v3 に リニューアルしました</h1>
        <div class="sign"><img src="/reports/og-mockups/echo-wordmark.png" alt="" /></div>
        <span class="meta">2026.06.11 · og:image · 1200×630</span>
      </div>
      <div class="mark tt"><i></i><span>field</span></div>
      <div class="mark tr"><i></i><span>1200×630</span></div>
    </div>
  </body>
</html>
