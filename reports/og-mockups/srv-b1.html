<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/reports/og-mockups/srv-base.css" />
    <style>
      .card{overflow:hidden;}
      .top{position:absolute;top:30px;left:52px;font-size:14px;color:var(--muted);}
      .yr{position:absolute;top:30px;right:52px;font-size:14px;color:var(--muted);}
      .label{position:absolute;top:74px;left:52px;background:var(--blue);color:var(--paper);
        padding:5px 12px;font-size:15px;}
      .title{position:absolute;top:122px;left:52px;font-weight:700;font-size:40px;line-height:1.18;
        letter-spacing:-0.02em;max-width:520px;color:var(--ink);word-break:keep-all;overflow-wrap:break-word;}
      /* diagonal hero */
      .stage{position:absolute;right:-30px;bottom:96px;transform:rotate(-11deg);transform-origin:right bottom;}
      .stage img{display:block;width:880px;}
      .rule{position:absolute;left:-40px;bottom:-26px;width:1040px;height:3px;background:var(--blue);
        box-shadow:0 8px 0 -1px oklch(0.630 0.256 25);}
      .sysr{position:absolute;right:52px;bottom:30px;font-family:ui-monospace,monospace;font-size:13px;
        letter-spacing:0.12em;color:var(--subtle);text-transform:uppercase;}
      .mark{position:absolute;display:flex;gap:7px;font-family:ui-monospace,monospace;
        font-size:12px;letter-spacing:0.12em;color:var(--blue);text-transform:uppercase;line-height:1;}
      .mark i{display:block;width:18px;height:18px;border:2px solid var(--blue);flex:0 0 auto;}
      .mark.tl{top:30px;left:52px;visibility:hidden;}
      .mark.tr{top:74px;right:52px;flex-direction:row-reverse;}
      .mark.tr i{border-left:0;border-bottom:0;}
      .mark.bl{bottom:30px;left:52px;align-items:flex-end;}
      .mark.bl i{border-right:0;border-top:0;}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="grid"></div>
      <span class="top mono">napochaan.com</span>
      <span class="yr mono">2026</span>
      <span class="label mono">news</span>
      <h1 class="title">サイトを<wbr /> v3 に<wbr />リニューアルしました</h1>
      <div class="stage">
        <div class="rule"></div>
        <img src="/reports/og-mockups/echo-wordmark.png" alt="" />
      </div>
      <span class="sysr">gen 0042 · alive 128 · watching 3</span>
      <div class="mark tr"><i></i><span>1200×630</span></div>
      <div class="mark bl"><i></i><span>2026.06.11</span></div>
    </div>
  </body>
</html>
