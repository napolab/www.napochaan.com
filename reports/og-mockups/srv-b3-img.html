<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/reports/og-mockups/srv-base.css" />
    <style>
      .card{overflow:hidden;}
      .field{position:absolute;right:0;top:0;bottom:0;width:792px;clip-path:polygon(100% 0,100% 100%,16% 100%);}
      .field img{width:100%;height:100%;object-fit:cover;display:block;}
      .col{position:absolute;left:0;top:0;bottom:0;width:420px;border-right:2px solid var(--ink);
        background:var(--canvas);padding:40px 36px;display:flex;flex-direction:column;z-index:2;}
      .top{font-family:ui-monospace,monospace;font-size:13px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}
      .label{align-self:flex-start;margin-top:22px;background:var(--blue);color:var(--paper);padding:5px 12px;font-size:15px;}
      .title{margin-top:18px;font-weight:700;font-size:34px;line-height:1.22;letter-spacing:-0.02em;
        color:var(--ink);word-break:keep-all;overflow-wrap:anywhere;}
      .sign{margin-top:auto;}
      .sign img{display:block;width:340px;height:auto;margin-left:-4px;}
      .meta{margin-top:14px;font-family:ui-monospace,monospace;font-size:12px;letter-spacing:0.12em;
        color:var(--subtle);text-transform:uppercase;}
      .ticket{position:absolute;right:44px;top:40px;background:var(--paper);color:var(--ink);
        border:2px solid var(--ink);padding:3px 8px;font-size:12px;font-family:ui-monospace,monospace;z-index:6;}
      .mark{position:absolute;display:flex;gap:7px;font-family:ui-monospace,monospace;z-index:6;
        font-size:12px;letter-spacing:0.12em;text-transform:uppercase;line-height:1;color:var(--paper);}
      .mark i{display:block;width:18px;height:18px;border:2px solid var(--paper);flex:0 0 auto;}
      .mark.br{bottom:40px;right:44px;flex-direction:row-reverse;align-items:flex-end;}
      .mark.br i{border-left:0;border-top:0;}
      .mark span{padding-bottom:3px;}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="grid"></div>
      <div class="field"><img src="/src/assets/work-22.jpg" alt="" /></div>
      <div class="col">
        <span class="top">napochaan.com</span>
        <span class="label mono">works</span>
        <h1 class="title">Booth²Booth<wbr /> vol.02<wbr /> 映像演出</h1>
        <div class="sign"><img src="/reports/og-mockups/echo-wordmark.png" alt="" /></div>
        <span class="meta">no.22 · vj / 映像 · 2026</span>
      </div>
      <span class="ticket">no.22</span>
      <div class="mark br"><i></i><span>1200×630</span></div>
    </div>
  </body>
</html>
