[[env.staging.d1_databases]]
binding = "D1"
database_id = "00000000-0000-0000-0000-000000000000" # TODO: wrangler d1 create napochaan-cms-staging
database_name = "napochaan-cms-staging"
remote = true

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "napochaan-cms-staging" # TODO: wrangler r2 bucket create napochaan-cms-staging

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "napochaan-website-staging"

[[env.staging.r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "napochaan-cache-staging" # TODO: wrangler r2 bucket create napochaan-cache-staging

[[env.staging.durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"

[[env.staging.durable_objects.bindings]]
name = "CURSOR_ROOM"
class_name = "CursorRoom"

[[env.staging.d1_databases]]
binding = "NEXT_TAG_CACHE_D1"
database_name = "napochaan-cache-staging"
database_id = "00000000-0000-0000-0000-000000000000" # TODO: wrangler d1 create napochaan-cache-staging

